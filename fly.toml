# fly.toml app configuration file generated for proofarcade-relay on 2026-05-27T13:39:00-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'proofarcade-relay'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  CORS_ORIGIN = 'https://proofarcade.xyz'
  PROVE_MODE = 'stub'
  SUBMIT_COOLDOWN_SECONDS = '60'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  # Free-tier compatible. Bump to performance-4x + memory=16gb when flipping
  # PROVE_MODE → groth16 (requires a Fly payment method on file).
  size = 'shared-cpu-1x'
  memory = '1gb'
