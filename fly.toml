# fly.toml app configuration file generated for proofarcade-relay on 2026-05-27T13:39:00-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'proofarcade-relay'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  CORS_ORIGIN = 'https://proofarcade.xyz'
  PROVE_MODE = 'stub'
  SUBMIT_COOLDOWN_SECONDS = '60'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  # Sized for real Groth16 wrap: the snark-wrap step needs ~16 GB RAM
  # and benefits from dedicated CPUs (proof time drops nearly linearly).
  # Cost is ~$0.10/hr while running, $0 idle (auto_stop_machines = stop).
  size = 'performance-4x'
  memory = '16gb'
