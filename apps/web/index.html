<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Proofworks Arcade</title>
    <meta name="description" content="Birdstrike — verified high scores on Stellar. Dodge birds. Manage fuel. Land in one piece." />

    <!-- Open Graph — picked up by Discord, Facebook, LinkedIn previews. -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Birdstrike — Proofworks Arcade" />
    <meta property="og:description" content="Verified high scores on Stellar. Every leaderboard entry is a ZK-proven replay." />
    <meta property="og:url" content="https://sentinel.xyz/birdstrike/leaderboard" />
    <meta property="og:image" content="https://sentinel.xyz/og/birdstrike.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter Card — falls back to og:* but `summary_large_image` + site
         handle give a richer preview on X. Image must be PNG/JPG; SVG is
         not supported by Twitter's card crawler. -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@sentinel_fi" />
    <meta name="twitter:title" content="Birdstrike — Proofworks Arcade" />
    <meta name="twitter:description" content="Verified high scores on Stellar. Every leaderboard entry is a ZK-proven replay." />
    <meta name="twitter:image" content="https://sentinel.xyz/og/birdstrike.png" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #000;
        height: 100%;
        overflow: hidden;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, monospace;
        color: #eee;
      }
      #game {
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <!-- Submit UI is injected dynamically by src/ui/submit-ui.ts only when
         the player has a fresh transcript to submit. Nothing chain-related
         is shown until then. -->
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
